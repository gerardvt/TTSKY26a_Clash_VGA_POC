name: test
on: [push, workflow_dispatch]
jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup GHC and Cabal
        uses: haskell-actions/setup@v2
        with:
          ghc-version: '9.6.7'
          cabal-version: 'latest'

      - name: Cache Cabal store and dist-newstyle
        uses: actions/cache@v4
        with:
          path: |
            ~/.cabal/store
            clash/dist-newstyle
          key: cabal-${{ runner.os }}-ghc9.6.7-${{ hashFiles('clash/vga-colorbars.cabal') }}
          restore-keys: cabal-${{ runner.os }}-ghc9.6.7-

      - name: Build Clash compiler
        run: |
          cd clash
          cabal update
          cabal build exe:clash

      - name: Generate Verilog from Clash
        run: |
          cd clash
          cabal exec clash -- --verilog -isrc Top -outputdir build
          VERILOG=$(find . -name 'tt_um_gerardvt_clash_poc.v' | head -1)
          sed -i '/timescale/d' "$VERILOG"
          cp "$VERILOG" ../src/gvt_core.v

      - name: Install iverilog
        shell: bash
        run: sudo apt-get update && sudo apt-get install -y iverilog

      - name: Setup python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Python packages
        shell: bash
        run: pip install -r test/requirements.txt

      - name: Run tests
        run: |
          cd test
          make clean
          make
          ! grep failure results.xml

      - name: Test Summary
        uses: test-summary/action@v2.4
        with:
          paths: "test/results.xml"
        if: always()

      - name: Upload waveform and test results
        if: success() || failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: |
            test/tb.fst
            test/results.xml
            test/output/*
